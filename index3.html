<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競馬レース出走馬一覧</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .race-header {
      background: #111827;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #1f2937;
    }

    .race-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .race-meta {
      font-size: 14px;
      color: #94a3b8;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls {
      margin-bottom: 12px;
      background: #111827;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    .control-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    select, input[type="range"] {
      background: #0b1220;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 6px 10px;
      border-radius: 8px;
    }

    input[type="range"] {
      width: 280px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
    }

    thead {
      background: #1f2937;
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      border-bottom: 1px solid #1f2937;
    }

    tr:hover {
      background: #0b1220;
    }

    .score-high {
      color: #22c55e;
      font-weight: 700;
    }

    .score-low {
      color: #94a3b8;
    }

    .mark {
      font-size: 16px;
      font-weight: 700;
      color: #fbbf24;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: #1f2937;
      border: 1px solid #334155;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="race-header">
      <div class="race-title" id="raceTitle"></div>
      <div class="race-meta">
        <span class="badge" id="raceDate"></span>
        <span class="badge" id="raceCourse"></span>
        <span class="badge" id="raceNo"></span>
        <span class="badge" id="raceInfo"></span>
      </div>
    </div>

    <div class="controls">
      <div class="control-row">
        <select id="dateSelect"></select>
        <select id="courseSelect"></select>
        <select id="raceNoSelect"></select>
      </div>

      <div class="control-row">
        <label>スコア閾値: <span id="thresholdValue">0.60</span></label>
        <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.60" />
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>枠</th>
          <th>馬番</th>
          <th>馬名</th>
          <th>騎手</th>
          <th>斤量</th>
          <th>人気</th>
          <th>オッズ</th>
          <th>スコア</th>
          <th>評価</th>
        </tr>
      </thead>
      <tbody id="horseTable"></tbody>
    </table>

  </div>

  <script>
    let threshold = 0.60;

    const races = [
      {
        date: "2026-05-15",
        course: "東京",
        raceNo: "11R",
        title: "日本ダービー",
        condition: "芝2400m / G1",
        horses: [
          { frame: 1, num: 1, name: "サンプルA", jockey: "田中", weight: 56, pop: 2, odds: 3.2, score: 0.78 },
          { frame: 1, num: 2, name: "サンプルB", jockey: "佐藤", weight: 57, pop: 5, odds: 12.4, score: 0.52 }
        ]
      },
      {
        date: "2026-05-15",
        course: "東京",
        raceNo: "10R",
        title: "準メイン",
        condition: "芝1600m / OP",
        horses: [
          { frame: 2, num: 3, name: "サンプルC", jockey: "鈴木", weight: 56, pop: 1, odds: 2.1, score: 0.81 },
          { frame: 2, num: 4, name: "サンプルD", jockey: "川田", weight: 55, pop: 8, odds: 40.0, score: 0.44 }
        ]
      },
      {
        date: "2026-05-16",
        course: "京都",
        raceNo: "5R",
        title: "新馬戦",
        condition: "芝2000m",
        horses: [
          { frame: 3, num: 5, name: "サンプルE", jockey: "松山", weight: 55, pop: 3, odds: 6.7, score: 0.69 }
        ]
      }
    ];

    function getSelectedRace() {
      const date = document.getElementById("dateSelect").value;
      const course = document.getElementById("courseSelect").value;
      const raceNo = document.getElementById("raceNoSelect").value;

      return races.find(r => r.date === date && r.course === course && r.raceNo === raceNo);
    }

    function renderRaceInfo(race) {
      document.getElementById("raceTitle").textContent = `${race.date} ${race.course} ${race.raceNo} ${race.title}`;
      document.getElementById("raceDate").textContent = `開催日: ${race.date}`;
      document.getElementById("raceCourse").textContent = `競馬場: ${race.course}`;
      document.getElementById("raceNo").textContent = `レース: ${race.raceNo}`;
      document.getElementById("raceInfo").textContent = race.condition;
    }

    function renderTable(race) {
      const tbody = document.getElementById("horseTable");
      tbody.innerHTML = "";

      race.horses.forEach(h => {
        const isHigh = h.score >= threshold;
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${h.frame}</td>
          <td>${h.num}</td>
          <td>${h.name}</td>
          <td>${h.jockey}</td>
          <td>${h.weight}</td>
          <td>${h.pop}</td>
          <td>${h.odds}</td>
          <td class="${isHigh ? 'score-high' : 'score-low'}">${h.score.toFixed(2)}</td>
          <td class="mark">${isHigh ? '○' : ''}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    function populateSelectors() {
      updateDateOptions();
      updateCourseOptions();
      updateRaceNoOptions();
    }

    function updateDateOptions() {
      const dateSelect = document.getElementById("dateSelect");
      const current = dateSelect.value;

      const dates = [...new Set(races.map(r => r.date))];

      dateSelect.innerHTML = "";

      dates.forEach(d => {
        dateSelect.innerHTML += `<option value="${d}">${d}</option>`;
      });

      if (dates.includes(current)) {
        dateSelect.value = current;
      }
    }

    function updateCourseOptions() {
      const date = document.getElementById("dateSelect").value;
      const courseSelect = document.getElementById("courseSelect");
      const current = courseSelect.value;

      const courses = [...new Set(
        races
          .filter(r => r.date === date)
          .map(r => r.course)
      )];

      courseSelect.innerHTML = "";

      courses.forEach(c => {
        courseSelect.innerHTML += `<option value="${c}">${c}</option>`;
      });

      if (courses.includes(current)) {
        courseSelect.value = current;
      }
    }

    function updateRaceNoOptions() {
      const date = document.getElementById("dateSelect").value;
      const course = document.getElementById("courseSelect").value;
      const raceNoSelect = document.getElementById("raceNoSelect");
      const current = raceNoSelect.value;

      const raceNos = [...new Set(
        races
          .filter(r => r.date === date && r.course === course)
          .map(r => r.raceNo)
      )];

      raceNoSelect.innerHTML = "";

      raceNos.forEach(r => {
        raceNoSelect.innerHTML += `<option value="${r}">${r}</option>`;
      });

      if (raceNos.includes(current)) {
        raceNoSelect.value = current;
      }
    }

    function updateView() {
      const race = getSelectedRace();
      if (!race) return;
      renderRaceInfo(race);
      renderTable(race);
    }

    document.getElementById("thresholdSlider").addEventListener("input", e => {
      threshold = parseFloat(e.target.value);
      document.getElementById("thresholdValue").textContent = threshold.toFixed(2);
      updateView();
    });

    document.getElementById("dateSelect").addEventListener("change", () => {
      updateCourseOptions();
      updateRaceNoOptions();
      updateView();
    });
    document.getElementById("courseSelect").addEventListener("change", () => {
      updateRaceNoOptions();
      updateView();
    });
    document.getElementById("raceNoSelect").addEventListener("change", updateView);

    populateSelectors();

    // 初期選択
    document.getElementById("dateSelect").value = races[0].date;
    document.getElementById("courseSelect").value = races[0].course;
    document.getElementById("raceNoSelect").value = races[0].raceNo;

    updateView();
  </script>

</body>
</html>
