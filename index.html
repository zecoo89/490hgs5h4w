<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競馬レース出走馬一覧</title>
  <style>
/* =========================
   Mobile
========================= */

    @media (max-width: 480px) {

      body {
        padding: 8px;
      }

      .container {
        max-width: 100%;
      }

      .card {
        padding: 10px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 18px;
      }

      .controls {
        gap: 6px;
      }

      select,
      input,
      button {
        font-size: 12px;
        padding: 4px 8px;
      }

      input[type="range"] {
        width: 120px;
      }

      .race-buttons {
        width: 100%;
        gap: 4px;
      }

      .race-button {
        width: 54px;
        font-size: 12px;
      }

      .meta {
        gap: 4px;
      }

      .badge {
        font-size: 11px;
        padding: 4px 6px;
      }

      /* 横スクロール */
      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        font-size: 12px;
        padding: 4px 6px;
        height: 26px;
      }

      td.horse-name {
        min-width: 140px;
      }

      .link-button {
        width: 48px;
        font-size: 11px;
        padding: 4px;
      }

    }


    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .race-header {
      background: #111827;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #1f2937;
    }

    .race-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .race-meta {
      font-size: 14px;
      color: #94a3b8;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls {
      margin-bottom: 12px;
      background: #111827;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    .control-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    select, input[type="range"] {
      background: #0b1220;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 6px 18px 6px 10px;
      border-radius: 8px;
    }

    input[type="range"] {
      width: 280px;
    }

    table {
      width: 100%;
      table-layout: auto;
      border-collapse: collapse;
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
    }

    thead {
      background: #1f2937;
    }

    th, td {
      height: 30px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    td.horse-name {
      overflow: visible;
      text-overflow: unset;
      padding: 10px 12px;
      font-size: 14px;
      border-bottom: 1px solid #1f2937;
    }

    tr:hover {
      background: #0b1220;
    }

    .score-high {
      color: #22c55e;
      font-weight: 700;
    }

    .score-low {
      color: #94a3b8;
    }

    .mark {
      font-size: 16px;
      font-weight: 700;
      color: #fbbf24;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: #1f2937;
      border: 1px solid #334155;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="race-header">
      <div class="race-title" id="raceTitle"></div>
      <div class="race-meta">
        <span class="badge" id="raceDate"></span>
        <span class="badge" id="raceCourse"></span>
        <span class="badge" id="raceNo"></span>
        <span class="badge" id="raceInfo"></span>
      </div>

      <div style="margin-top: 12px; display: flex; gap: 8px;">
        <a id="netkeibaRaceLink" href="#" target="_blank">
          <button>netkeiba レース結果</button>
        </a>
      </div>
    </div>

    <div class="controls">
      <div class="control-row">
        <select id="dateSelect"></select>
        <select id="courseSelect"></select>
        <div id="raceList" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
      </div>

      <div class="control-row">
        <label>スコア閾値:</label>
        <span id="thresholdValue">0.60</span>
        <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.60" />
        <input type="number" id="thresholdInput" min="0" max="1" step="0.01" value="0.60" style="width: 90px;" />
        <button id="sortButton">スコア降順: ON</button>
      </div>
    </div>

    <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>枠</th>
              <th>馬番</th>
              <th>馬名</th>
              <th>騎手</th>
              <th>人気</th>
              <th>オッズ</th>
              <th>スコア</th>
              <th>評価</th>
              <th>馬詳細</th>
            </tr>
          </thead>
          <tbody id="horseTable"></tbody>
        </table>
    </div>

  </div>

  <script>
    let threshold = 0.60;
    let selectedRaceNo = null;
    let sortEnabled = true;

    let races = [];

    function formatDate(dateStr) {
      const y = dateStr.slice(0, 4);
      const m = dateStr.slice(4, 6);
      const d = dateStr.slice(6, 8);

      return `${y}年${m}月${d}日`;
    }

    function jrdbToNetkeiba(raceKey) {
      const place = raceKey.slice(0, 2);
      const year = raceKey.slice(2, 4);
      const kaisai = raceKey.slice(4, 5);
      const day = raceKey.slice(5, 6);
      const raceNum = raceKey.slice(6, 8);

      const dayNum = parseInt(day, 16).toString().padStart(2, "0");
      const kaisaiNum = parseInt(kaisai, 10).toString().padStart(2, "0");

      return `20${year}${place}${kaisaiNum}${dayNum}${raceNum}`;
    }

    function createNetkeibaUrl(raceKey) {
      const raceId = jrdbToNetkeiba(raceKey);
      return `https://race.netkeiba.com/race/result.html?race_id=${raceId}&amp;rf=race_submenu`;
    }

    function createHorseUrl(bloodId) {
      return `https://db.netkeiba.com/horse/${bloodId}`;
    }

    function getSelectedRace() {
      const date = document.getElementById("dateSelect").value;
      const course = document.getElementById("courseSelect").value;
      const raceNo = selectedRaceNo;

      return races.find(r => r.date === date && r.course === course && r.raceNo === raceNo);
    }

    function renderRaceInfo(race) {
      document.getElementById("raceTitle").textContent = `${race.date} ${race.course} ${race.raceNo} ${race.title}`;
      document.getElementById("raceDate").textContent = `開催日: ${race.date}`;
      document.getElementById("raceCourse").textContent = `競馬場: ${race.course}`;
      document.getElementById("raceNo").textContent = `レース: ${race.raceNo}`;
      document.getElementById("raceInfo").textContent = race.condition;

      document.getElementById("netkeibaRaceLink").href = createNetkeibaUrl(race.raceKey);
    }

    function renderTable(race) {
      const tbody = document.getElementById("horseTable");
      tbody.innerHTML = "";

      let horses = [...race.horses];

      if (sortEnabled) {
        horses.sort((a, b) => b.score - a.score);
      } else {
        horses.sort((a, b) => a.num - b.num);
      }

      horses.forEach(h => {
        const isHigh = h.score >= threshold;
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${h.frame}</td>
          <td>${h.num}</td>
          <td class="horse-name">${h.name}</td>
          <td>${h.jockey}</td>
          <td>${h.pop}</td>
          <td>${h.odds}</td>
          <td class="${isHigh ? 'score-high' : 'score-low'}">${h.score.toFixed(2)}</td>
          <td class="mark">${isHigh ? '○' : ''}</td>
          <td>
            <a href="${createHorseUrl(h.bloodId)}" target="_blank">
              <button>詳細</button>
            </a>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    function populateSelectors() {
      updateDateOptions();
      updateCourseOptions();
      updateRaceNoOptions();
    }

    function updateDateOptions() {
      const dateSelect = document.getElementById("dateSelect");
      const current = dateSelect.value;

      const dates = [...new Set(races.map(r => r.date))];

      dateSelect.innerHTML = "";

      dates.forEach(d => {
        dateSelect.innerHTML += `<option value="${d}">${d}</option>`;
      });

      if (dates.includes(current)) {
        dateSelect.value = current;
      }
    }

    function updateCourseOptions() {
      const date = document.getElementById("dateSelect").value;
      const courseSelect = document.getElementById("courseSelect");
      const current = courseSelect.value;

      const courses = [...new Set(
        races
          .filter(r => r.date === date)
          .map(r => r.course)
      )];

      courseSelect.innerHTML = "";

      courses.forEach(c => {
        courseSelect.innerHTML += `<option value="${c}">${c}</option>`;
      });

      if (courses.includes(current)) {
        courseSelect.value = current;
      }
    }

    function updateRaceNoOptions() {
      const date = document.getElementById("dateSelect").value;
      const course = document.getElementById("courseSelect").value;

      const raceList = document.getElementById("raceList");
      raceList.innerHTML = "";

      const targetRaces = races
        .filter(r => r.date === date && r.course === course)
        .sort((a, b) => parseInt(a.raceNo) - parseInt(b.raceNo));

      if (!selectedRaceNo && targetRaces.length > 0) {
        selectedRaceNo = targetRaces[0].raceNo;
      }

      targetRaces.forEach(race => {
        const hasHighScore = race.horses.some(h => h.score >= threshold);

        const button = document.createElement("button");

        button.textContent = `${hasHighScore ? '★ ' : '　 '}${race.raceNo}`;

        button.style.padding = "6px 10px";
        button.style.width = "64px";
        button.style.borderRadius = "8px";
        button.style.border = race.raceNo === selectedRaceNo
          ? "1px solid #fbbf24"
          : "1px solid #334155";

        button.style.background = race.raceNo === selectedRaceNo
          ? "#1e293b"
          : "#0b1220";

        button.style.color = hasHighScore ? "#fbbf24" : "#e2e8f0";

        button.addEventListener("click", () => {
          selectedRaceNo = race.raceNo;
          updateRaceNoOptions();
          updateView();
        });

        raceList.appendChild(button);
      });
    }

    function updateView() {
      const race = getSelectedRace();
      if (!race) return;
      renderRaceInfo(race);
      renderTable(race);
    }

    document.getElementById("thresholdSlider").addEventListener("input", e => {
      threshold = parseFloat(e.target.value);
      document.getElementById("thresholdValue").textContent = threshold.toFixed(2);
      document.getElementById("thresholdInput").value = threshold.toFixed(2);
      updateRaceNoOptions();
      updateView();
    });

    document.getElementById("thresholdInput").addEventListener("input", e => {
      let value = parseFloat(e.target.value);

      if (isNaN(value)) return;

      value = Math.max(0, Math.min(1, value));

      threshold = value;

      document.getElementById("thresholdSlider").value = value;
      document.getElementById("thresholdValue").textContent = value.toFixed(2);

      updateRaceNoOptions();
      updateView();
    });

    document.getElementById("sortButton").addEventListener("click", () => {
      sortEnabled = !sortEnabled;

      document.getElementById("sortButton").textContent =
        `スコア降順: ${sortEnabled ? 'ON' : 'OFF'}`;

      updateView();
    });

    document.getElementById("dateSelect").addEventListener("change", () => {
      selectedRaceNo = null;
      updateCourseOptions();
      updateRaceNoOptions();
      updateView();
    });
    document.getElementById("courseSelect").addEventListener("change", () => {
      selectedRaceNo = null;
      updateRaceNoOptions();
      updateView();
    });
    

    async function loadData() {
      const response = await fetch("./data.json");
      const rawData = await response.json();

      // レース単位にグループ化
      const raceMap = new Map();

      rawData.forEach(row => {
        const raceKey = row["レースキー"];

        if (!raceMap.has(raceKey)) {
          raceMap.set(raceKey, {
            raceKey,
            date: formatDate(String(row["開催日"])),
            course: row["競馬場名"],
            raceNo: `${row["Ｒ"]}R`,
            title: row["レース名９文字"],
            condition: `${row["芝ダ障害"]} ${row["距離"]}m / ${row["条件"]}`,
            horses: []
          });
        }

        raceMap.get(raceKey).horses.push({
          frame: row["枠番"],
          num: row["馬番"],
          name: row["馬名"],
          jockey: row["騎手名"],
          weight: "-",
          pop: row["基準単勝人気順位"],
          odds: row["基準単勝オッズ"],
          score: row["pred_normalized"],
          bloodId: `20${row["血統登録番号"]}`
        });
      });

      races = [...raceMap.values()];

      populateSelectors();

      // 初期選択
      document.getElementById("dateSelect").value = races[0].date;
      updateCourseOptions();
      document.getElementById("courseSelect").value = races[0].course;
      updateRaceNoOptions();
      selectedRaceNo = races[0].raceNo;

      updateView();
    }

    loadData();
  </script>

</body>
</html>
