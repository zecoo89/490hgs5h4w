<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競馬レース出走馬一覧</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .race-header {
      background: #111827;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid #1f2937;
    }

    .race-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .race-meta {
      font-size: 14px;
      color: #94a3b8;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls {
      margin-bottom: 12px;
      background: #111827;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
    }

    thead {
      background: #1f2937;
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      border-bottom: 1px solid #1f2937;
    }

    tr:hover {
      background: #0b1220;
    }

    .score-high {
      color: #22c55e;
      font-weight: 700;
    }

    .score-low {
      color: #94a3b8;
    }

    .mark {
      font-size: 16px;
      font-weight: 700;
      color: #fbbf24;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: #1f2937;
      border: 1px solid #334155;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="race-header">
      <div class="race-title" id="raceTitle"></div>
      <div class="race-meta">
        <span class="badge" id="raceDate"></span>
        <span class="badge" id="raceCourse"></span>
        <span class="badge" id="raceNo"></span>
        <span class="badge" id="raceInfo"></span>
      </div>
    </div>

    <div class="controls">
      <div class="slider-wrap">
        <label>スコア閾値: <span id="thresholdValue">0.60</span></label>
        <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.60" />
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>枠</th>
          <th>馬番</th>
          <th>馬名</th>
          <th>騎手</th>
          <th>斤量</th>
          <th>人気</th>
          <th>オッズ</th>
          <th>スコア</th>
          <th>評価</th>
        </tr>
      </thead>
      <tbody id="horseTable"></tbody>
    </table>

  </div>

  <script>
    let threshold = 0.60;

    const raceInfo = {
      date: "2026-05-15",
      course: "東京",
      raceNo: "11R",
      title: "日本ダービー",
      condition: "芝2400m / G1"
    };

    const horses = [
      { frame: 1, num: 1, name: "サンプルホースA", jockey: "田中", weight: 56, pop: 2, odds: 3.2, score: 0.78 },
      { frame: 1, num: 2, name: "サンプルホースB", jockey: "佐藤", weight: 57, pop: 5, odds: 12.4, score: 0.52 },
      { frame: 2, num: 3, name: "サンプルホースC", jockey: "鈴木", weight: 56, pop: 1, odds: 2.1, score: 0.81 },
      { frame: 2, num: 4, name: "サンプルホースD", jockey: "川田", weight: 55, pop: 8, odds: 40.0, score: 0.44 }
    ];

    function renderRaceInfo() {
      document.getElementById("raceTitle").textContent = `${raceInfo.date} ${raceInfo.course} ${raceInfo.raceNo} ${raceInfo.title}`;
      document.getElementById("raceDate").textContent = `開催日: ${raceInfo.date}`;
      document.getElementById("raceCourse").textContent = `競馬場: ${raceInfo.course}`;
      document.getElementById("raceNo").textContent = `レース: ${raceInfo.raceNo}`;
      document.getElementById("raceInfo").textContent = raceInfo.condition;
    }

    function renderTable() {
      const tbody = document.getElementById("horseTable");
      tbody.innerHTML = "";

      horses.forEach(h => {
        const isHigh = h.score >= threshold;
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${h.frame}</td>
          <td>${h.num}</td>
          <td>${h.name}</td>
          <td>${h.jockey}</td>
          <td>${h.weight}</td>
          <td>${h.pop}</td>
          <td>${h.odds}</td>
          <td class="${isHigh ? 'score-high' : 'score-low'}">${h.score.toFixed(2)}</td>
          <td class="mark">${isHigh ? '○' : ''}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    const slider = document.getElementById("thresholdSlider");
    const thresholdValue = document.getElementById("thresholdValue");

    slider.addEventListener("input", (e) => {
      threshold = parseFloat(e.target.value);
      thresholdValue.textContent = threshold.toFixed(2);
      renderTable();
    });

    renderRaceInfo();
    renderTable();
  </script>

</body>
</html>
